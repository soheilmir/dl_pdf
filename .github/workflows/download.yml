name: Download Files

on:
  workflow_dispatch: # این گزینه به شما اجازه میدهد workflow را به صورت دستی اجرا کنید

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Download a file
        run: |
          # لینک دانلود فایل خود را جایگزین کنید
          curl -L -o downloaded_file.pdf "https://www.nxp.com/docs/en/application-note/AN4399.pdf"
          
      - name: Upload as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-downloaded-file
          path: downloaded_file.pdf
